<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thesis Simulation - WebGPU</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #050505;
        color: #f0f0f0;
        font-family: system-ui, sans-serif;
        height: 100%;
        overflow: hidden;
      }
      #container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      .hud {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.4);
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        line-height: 1.4;
        backdrop-filter: blur(8px);
      }
      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <canvas id="sim"></canvas>
      <div class="hud">
        <div>Agents: <span id="agentCount"></span></div>
        <div>FPS: <span id="fps">0</span></div>
        <div>Trail decay: <span id="decay"></span></div>
        <div>WebGPU build: <span id="build"></span></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
