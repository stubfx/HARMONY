<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life — Hidden Message</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="grid"></canvas>

  <div id="toolbar">
    <div id="msg-wrap">
      <label for="msg-input">message</label>
      <input id="msg-input" type="text" value="HARMONY" maxlength="64" spellcheck="false" />
    </div>
    <div id="char-indicator">
      <span id="char-queue"></span>
    </div>
    <div id="controls">
      <button id="btn-step">step</button>
      <button id="btn-play">play</button>
      <button id="btn-clear">clear</button>
    </div>
    <div id="legend">■■ = dot &nbsp;·&nbsp; ⬡ = dash &nbsp;(morse)</div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
