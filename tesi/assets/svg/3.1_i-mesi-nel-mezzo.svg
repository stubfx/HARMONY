<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- 4x4 Conway-like grid, cells 30x30, step 42px, origin (316,316) -->
  <!-- Row 0: col 0, col 2 -->
  <rect x="316" y="316" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <rect x="400" y="316" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <!-- Row 1: col 1, col 2 -->
  <rect x="358" y="358" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <rect x="400" y="358" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <!-- Row 2: col 0, col 3 -->
  <rect x="316" y="400" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <rect x="442" y="400" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <!-- Row 3: col 1, col 3 -->
  <rect x="358" y="442" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
  <rect x="442" y="442" width="30" height="30" fill="none" stroke="#3d3d3d" stroke-width="1"/>
</svg>
