<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chladni</title>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <input
      type="text"
      id="text-input"
      autocomplete="off"
      spellcheck="false"
      placeholder="type something"
    />
    <div id="controls">
      <!-- row 1: pattern controls + play -->
      <div class="row">
        <div class="ctrl">
          <label>threshold</label>
          <input type="range" id="s-threshold" min="0.04" max="0.45" value="0.15" step="0.01"/>
          <span id="v-threshold">0.15</span>
        </div>
        <div class="ctrl">
          <label>scatter</label>
          <input type="range" id="s-scatter" min="0" max="6" value="1" step="0.1"/>
          <span id="v-scatter">1.00</span>
        </div>
        <div class="ctrl">
          <label>jitter</label>
          <input type="range" id="s-jitter" min="0" max="2" value="0.4" step="0.05"/>
          <span id="v-jitter">0.40</span>
        </div>
        <div class="ctrl">
          <label>noise</label>
          <input type="range" id="s-noise" min="0" max="1" value="0" step="0.02"/>
          <span id="v-noise">0.00</span>
        </div>
        <button id="btn-play">play</button>
      </div>
      <!-- row 2: density + mode + export -->
      <div class="row">
        <div class="ctrl">
          <label>density</label>
          <select id="s-density">
            <option value="5">light</option>
            <option value="3" selected>medium</option>
            <option value="2">fine</option>
          </select>
        </div>
        <div class="ctrl">
          <select id="s-mode">
            <option value="dots">dots</option>
            <option value="lines">lines</option>
          </select>
        </div>
        <div class="ctrl dim">
          <input type="number" id="s-width"  value="14.8" min="1" max="9999" step="0.1"/>
          <span class="sep">×</span>
          <input type="number" id="s-height" value="21" min="1" max="9999" step="0.1"/>
          <select id="s-unit">
            <option value="mm">mm</option>
            <option value="cm" selected>cm</option>
            <option value="pt">pt</option>
            <option value="in">in</option>
          </select>
        </div>
        <button id="btn-export">export svg</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
