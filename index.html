<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>swarm</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body   { margin: 0; background: #000; overflow: hidden; font-family: monospace; }

        /* ── Formula panel ──────────────────────────────────────────────────── */
        #ui {
            position: fixed;
            bottom: 1.2rem;
            left:   1.2rem;
            z-index: 10;
            display: none;
            flex-direction: column;
            gap: .5rem;
            pointer-events: none;
        }
        #ui > * { pointer-events: auto; }

        .field-row {
            display: flex;
            flex-direction: column;
            gap: .18rem;
        }
        .field-label {
            font-size: .65rem;
            color: #ffffff40;
            user-select: none;
            letter-spacing: .04em;
        }
        .formula-input {
            font-family: monospace;
            font-size: .8rem;
            padding: .3rem .5rem;
            width: 360px;
            background: rgba(0, 0, 0, .72);
            color: #c8ffc8;
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 3px;
            outline: none;
            transition: border-color .15s;
        }
        .formula-input:focus { border-color: rgba(150, 255, 150, .5); }

        #actions {
            display: flex;
            gap: .4rem;
            align-items: center;
        }
        #apply-btn {
            padding: .28rem .6rem;
            background: rgba(255,255,255,.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            font-size: .72rem;
        }
        #apply-btn:hover { background: rgba(255,255,255,.2); }

        #presets {
            display: flex;
            flex-wrap: wrap;
            gap: .28rem;
        }
        .preset-btn {
            padding: .18rem .45rem;
            background: rgba(255,255,255,.06);
            color: #ffffff60;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            font-size: .65rem;
        }
        .preset-btn:hover { background: rgba(255,255,255,.16); color: #fff; }

        #error-msg {
            font-size: .68rem;
            color: #ff6666;
            max-width: 440px;
            white-space: pre-wrap;
            display: none;
        }

        .text-input {
            font-family: monospace;
            font-size: .8rem;
            padding: .3rem .5rem;
            width: 360px;
            background: rgba(0, 0, 0, .72);
            color: #ffd580;
            border: 1px solid rgba(255, 200, 80, .22);
            border-radius: 3px;
            outline: none;
            transition: border-color .15s;
        }
        .text-input:focus { border-color: rgba(255, 200, 80, .55); }
        .text-input::placeholder { color: rgba(255, 200, 80, .25); }

        /* ── Caption — story subtitle overlay ──────────────────────────────── */
        #caption {
            position: fixed;
            bottom: 3.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            max-width: 72%;
            padding: .55rem 1.4rem;
            background: rgba(0, 0, 0, .55);
            color: rgba(255, 255, 255, .9);
            font-family: monospace;
            font-size: 1.1rem;
            line-height: 1.55;
            text-align: center;
            letter-spacing: .04em;
            border-radius: 4px;
            pointer-events: none;
            white-space: pre-wrap;
            opacity: 0;
            transition: opacity .5s ease;
        }

        /* ── Monitor ────────────────────────────────────────────────────────── */
        #monitor {
            position: fixed;
            top: .8rem;
            left: .8rem;
            display: none;
            flex-direction: column;
            gap: .15rem;
            font-size: .68rem;
            color: #ffffff35;
            pointer-events: none;
            letter-spacing: .06em;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div id="monitor">
        <span id="mon-res"></span>
        <span id="mon-fps"></span>
        <span id="mon-agents"></span>
    </div>

    <div id="ui">
        <div class="field-row">
            <span class="field-label">trace text &nbsp; imprints as agent attractor</span>
            <input id="trace-text-input" class="text-input" type="text" spellcheck="false" autocomplete="off" placeholder="type to imprint text as trace…" />
        </div>
        <div class="field-row">
            <span class="field-label">direction &nbsp; angle = f(x, y, t, idx, cx, cy)</span>
            <input id="dir-input"  class="formula-input" type="text" spellcheck="false" autocomplete="off" />
        </div>
        <div class="field-row">
            <span class="field-label">wind &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; angle = f(x, y, t, idx, cx, cy)</span>
            <input id="wind-input" class="formula-input" type="text" spellcheck="false" autocomplete="off" />
        </div>
        <div id="actions">
            <button id="apply-btn">Apply ↵</button>
        </div>
        <div id="presets"></div>
        <div id="error-msg"></div>
        <canvas id="qr-canvas" style="display:none;opacity:0.7;border-radius:4px;"></canvas>
    </div>

    <input id="image-input"     type="file" accept="image/*" style="display:none;">
    <input id="avoid-map-input" type="file" accept="image/*" style="display:none;">
    <script type="module" src="/src/sim.js"></script>
</body>
</html>
