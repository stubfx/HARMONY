<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waveform</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="grid"></canvas>

  <div id="toolbar">
    <div class="row">
      <label id="file-btn">load audio<input type="file" id="file-input" accept="audio/*" /></label>
      <span id="file-name">—</span>
      <button id="btn-sine">sine wave</button>
      <button id="btn-play" disabled>play</button>
    </div>
    <div class="row">
      <label id="mask-btn">load mask<input type="file" id="mask-input" accept="image/*" /></label>
      <span id="mask-name">—</span>
      <button id="btn-clear-mask" hidden>✕</button>
      <button id="btn-fogra39">fogra39</button>
      <label id="icc-btn">load profile<input type="file" id="icc-input" accept=".icc,.icm" /></label>
      <span id="icc-name">—</span>
      <button id="btn-clear-icc" hidden>✕</button>
      <button id="btn-export">export cmyk</button>
    </div>

    <div class="row controls">
      <div class="ctrl">
        <label>density</label>
        <input type="range" id="s-density" min="2"   max="24"  value="5"   step="1"    />
        <span id="v-density">5px</span>
      </div>
      <div class="ctrl">
        <label>amp</label>
        <input type="range" id="s-amp"     min="0.1" max="3"   value="1"   step="0.05" />
        <span id="v-amp">1.0</span>
      </div>
      <div class="ctrl">
        <label>fade</label>
        <input type="range" id="s-fade"    min="0"   max="4"   value="4"   step="0.1"  />
        <span id="v-fade">4.0</span>
      </div>
      <div class="ctrl">
        <label>smooth</label>
        <input type="range" id="s-smooth"  min="0"   max="40"  value="2"   step="1"    />
        <span id="v-smooth">2</span>
      </div>
      <div class="ctrl">
        <label>jitter</label>
        <input type="range" id="s-jitter"  min="0"   max="8"   value="0"   step="0.25" />
        <span id="v-jitter">0.00</span>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
